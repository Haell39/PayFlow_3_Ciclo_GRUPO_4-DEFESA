<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayFlow— Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-lock-fill"></i></div>
      <div class="logo-text">Pay<span>Flow</span></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a class="nav-item {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('pagina_dashboard') }}">
        <i class="bi bi-grid-1x2-fill nav-icon"></i> Dashboard
      </a>
      <a class="nav-item {% if active == 'transacoes' %}active{% endif %}" href="{{ url_for('pagina_transacoes') }}">
        <i class="bi bi-arrow-left-right nav-icon"></i> Transações
        <span class="nav-badge">12</span>
      </a>
      <span class="nav-section-label">Serviços</span>
      <a class="nav-item {% if active == 'cartoes' %}active{% endif %}" href="{{ url_for('pagina_cartoes') }}">
        <i class="bi bi-credit-card-2-front-fill nav-icon"></i> Cartões
      </a>
      <a class="nav-item {% if active == 'investimentos' %}active{% endif %}" href="{{ url_for('pagina_investimentos') }}">
        <i class="bi bi-graph-up-arrow nav-icon"></i> Investimentos
      </a>
      <span class="nav-section-label">Conta</span>
      <a class="nav-item {% if active == 'seguranca' %}active{% endif %}" href="{{ url_for('pagina_seguranca') }}">
        <i class="bi bi-shield-check nav-icon"></i> Segurança
      </a>
      <a class="nav-item {% if active == 'perfil' %}active{% endif %}" href="{{ url_for('pagina_perfil') }}">
        <i class="bi bi-person-circle nav-icon"></i> Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-initials">--</div>
        <div class="user-info">
          <div class="user-name" id="sb-nome">Carregando…</div>
          <div class="user-email" id="sb-email"></div>
        </div>
        <i class="bi bi-power user-logout" title="Sair" id="btn-logout"></i>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div>
        <div class="topbar-title">Perfil</div>
        <div class="topbar-sub">Gerencie suas informações pessoais</div>
      </div>
      <div class="topbar-right">
        <div class="user-avatar" id="top-initials" style="width:36px;height:36px;font-size:14px">--</div>
      </div>
    </header>
    <div class="page-content">
      <div class="profile-header">
        <div class="profile-avatar" id="profile-initials">--</div>
        <div>
          <div class="profile-name" id="profile-name"></div>
          <div class="profile-email" id="profile-email"></div>
          <div class="profile-since" id="profile-since">Membro desde Jan 2024</div>
        </div>
      </div>
      <div class="profile-grid">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Informações pessoais</span></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:1rem">
            <div class="field">
              <label>Nome completo</label>
              <input type="text" id="profile-input-name" placeholder="Seu nome">
            </div>
            <div class="field">
              <label>E-mail</label>
              <input type="email" id="profile-input-email" placeholder="seu@email.com" readonly style="opacity:0.5;cursor:not-allowed">
            </div>
            <button class="btn" style="margin-top:0" id="btn-atualizar-perfil">Salvar alterações</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Alterar senha</span></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:1rem">
            <div class="field"><label>Senha atual</label><input type="password" id="senha-atual" placeholder="••••••••" autocomplete="current-password"></div>
            <div class="field"><label>Nova senha</label><input type="password" id="senha-nova" placeholder="••••••••" autocomplete="new-password"></div>
            <div class="field"><label>Confirmar nova senha</label><input type="password" id="senha-confirma" placeholder="••••••••" autocomplete="new-password"></div>
            <button class="btn" style="margin-top:0" id="btn-atualizar-senha">Atualizar senha</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-wrap" class="toast-wrap"></div>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/shared.js') }}"></script>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/perfil.js') }}"></script>
</body>
</html>
