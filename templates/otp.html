<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>ConectaSaúde — Verificação 2FA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div id="auth-root" class="auth-body">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div class="logo-text">Conecta<span>Saúde</span></div>
    </div>
    <div class="screen active">
      <h2>Verificação</h2>
      <p class="subtitle" id="otp-sub">Digite o código de 6 dígitos</p>
      <div id="otp-demo" class="demo-badge" style="display:none">
        Código OTP (demo): <strong id="otp-codigo"></strong>
      </div>
      <div id="otp-msg" class="msg"></div>
      <div class="otp-wrap">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric" autocomplete="one-time-code">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
      </div>
      <button class="btn" id="btn-verificar-otp">Verificar código</button>
      <a href="{{ url_for('pagina_login') }}" class="btn btn-ghost" style="display:block;text-align:center;margin-top:0.5rem;text-decoration:none;padding:12px;border-radius:10px;">← Voltar ao login</a>
    </div>
  </div>
</div>
<div id="toast-wrap" class="toast-wrap"></div>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/otp.js') }}"></script>
</body>
</html>
