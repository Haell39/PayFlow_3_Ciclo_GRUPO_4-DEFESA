<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayFlow — Transações</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-lock-fill"></i></div>
      <div class="logo-text">Pay<span>Flow</span></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a class="nav-item {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('pagina_dashboard') }}">
        <i class="bi bi-grid-1x2-fill nav-icon"></i> Dashboard
      </a>
      <a class="nav-item {% if active == 'transacoes' %}active{% endif %}" href="{{ url_for('pagina_transacoes') }}">
        <i class="bi bi-arrow-left-right nav-icon"></i> Transações
        <span class="nav-badge">12</span>
      </a>
      <span class="nav-section-label">Serviços</span>
      <a class="nav-item {% if active == 'cartoes' %}active{% endif %}" href="{{ url_for('pagina_cartoes') }}">
        <i class="bi bi-credit-card-2-front-fill nav-icon"></i> Cartões
      </a>
      <a class="nav-item {% if active == 'investimentos' %}active{% endif %}" href="{{ url_for('pagina_investimentos') }}">
        <i class="bi bi-graph-up-arrow nav-icon"></i> Investimentos
      </a>
      <span class="nav-section-label">Conta</span>
      <a class="nav-item {% if active == 'seguranca' %}active{% endif %}" href="{{ url_for('pagina_seguranca') }}">
        <i class="bi bi-shield-check nav-icon"></i> Segurança
      </a>
      <a class="nav-item {% if active == 'perfil' %}active{% endif %}" href="{{ url_for('pagina_perfil') }}">
        <i class="bi bi-person-circle nav-icon"></i> Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-initials">--</div>
        <div class="user-info">
          <div class="user-name" id="sb-nome">Carregando…</div>
          <div class="user-email" id="sb-email"></div>
        </div>
        <i class="bi bi-power user-logout" title="Sair" id="btn-logout"></i>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div>
        <div class="topbar-title">Transações</div>
        <div class="topbar-sub">Histórico completo de movimentações</div>
      </div>
      <div class="topbar-right">
        <div class="user-avatar" id="top-initials" style="width:36px;height:36px;font-size:14px">--</div>
      </div>
    </header>
    <div class="page-content">
      <div class="tx-toolbar">
        <input type="text" id="tx-search" class="tx-search" placeholder="🔍  Buscar por nome ou categoria…">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="credit">Receitas</button>
        <button class="filter-btn" data-filter="debit">Despesas</button>
        <button class="btn-new-tx" id="btn-abrir-modal">+ Nova transação</button>
      </div>
      <div class="panel">
        <table class="tx-table">
          <thead><tr><th>Movimentação</th></tr></thead>
          <tbody id="tx-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="nova-tx-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nova transação</span>
      <button class="modal-close" id="btn-fechar-modal">×</button>
    </div>
    <div class="field"><label>Descrição</label>
      <input type="text" id="ntx-nome" placeholder="Ex: Supermercado, Salário…">
    </div>
    <div class="field"><label>Valor (R$)</label>
      <input type="number" id="ntx-valor" placeholder="0,00" min="0.01" step="0.01">
    </div>
    <div class="field"><label>Tipo</label>
      <select id="ntx-tipo">
        <option value="debit">💸 Despesa</option>
        <option value="credit">💰 Receita</option>
      </select>
    </div>
    <div class="field"><label>Categoria</label>
      <select id="ntx-cat">
        <option>Alimentação</option><option>Moradia</option><option>Transporte</option>
        <option>Saúde</option><option>Lazer</option><option>Educação</option>
        <option>Serviços</option><option>Transferência</option><option>Renda</option><option>Outros</option>
      </select>
    </div>
    <button class="btn" id="btn-salvar-transacao">Registrar transação</button>
    <button class="btn btn-ghost" id="btn-cancelar-modal">Cancelar</button>
  </div>
</div>
<div id="toast-wrap" class="toast-wrap"></div>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/shared.js') }}"></script>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/transacoes.js') }}"></script>
</body>
</html>
