<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConectaSaúde — Consultas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-heart-pulse-fill"></i></div>
      <div class="logo-text">Conecta<span>Saúde</span></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a class="nav-item {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('pagina_dashboard') }}">
        <i class="bi bi-grid-1x2-fill nav-icon"></i> Dashboard
      </a>
      <a class="nav-item {% if active == 'consultas' %}active{% endif %}" href="{{ url_for('pagina_consultas') }}">
        <i class="bi bi-calendar-event nav-icon"></i> Consultas
        <span class="nav-badge" id="sidebar-badge-consultas">3</span>
      </a>
      <span class="nav-section-label">Serviços</span>
      <a class="nav-item {% if active == 'cartao-sus' %}active{% endif %}" href="{{ url_for('pagina_cartao_sus') }}">
        <i class="bi bi-card-checklist nav-icon"></i> Cartão SUS & Planos
      </a>
      <a class="nav-item {% if active == 'unidades' %}active{% endif %}" href="{{ url_for('pagina_unidades') }}">
        <i class="bi bi-hospital nav-icon"></i> Unidades de Saúde
      </a>
      <span class="nav-section-label">Conta</span>
      <a class="nav-item {% if active == 'seguranca' %}active{% endif %}" href="{{ url_for('pagina_seguranca') }}">
        <i class="bi bi-shield-check nav-icon"></i> Segurança
      </a>
      <a class="nav-item {% if active == 'perfil' %}active{% endif %}" href="{{ url_for('pagina_perfil') }}">
        <i class="bi bi-person-circle nav-icon"></i> Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-initials">--</div>
        <div class="user-info">
          <div class="user-name" id="sb-nome">Carregando…</div>
          <div class="user-email" id="sb-email"></div>
        </div>
        <i class="bi bi-power user-logout" title="Sair" id="btn-logout"></i>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div>
        <div class="topbar-title">Consultas</div>
        <div class="topbar-sub">Histórico e novos agendamentos</div>
      </div>
      <div class="topbar-right">
        <div class="user-avatar" id="top-initials" style="width:36px;height:36px;font-size:14px">--</div>
      </div>
    </header>
    <div class="page-content">
      <div class="tx-toolbar">
        <input type="text" id="tx-search" class="tx-search" placeholder="🔍  Buscar por especialidade ou unidade…">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="sus">SUS</button>
        <button class="filter-btn" data-filter="particular">Particular/Convênio</button>
        <button class="btn-new-tx" id="btn-abrir-modal">+ Novo Agendamento</button>
      </div>
      <div class="panel">
        <table class="tx-table" style="width:100%; border-collapse: collapse;">
          <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--border);">
              <th style="padding: 12px 1.5rem;">Especialidade / Médico</th>
              <th style="padding: 12px 1rem;">Data & Hora</th>
              <th style="padding: 12px 1rem;">Local</th>
              <th style="padding: 12px 1rem;">Tipo</th>
              <th style="padding: 12px 1.5rem; text-align: right;">Status</th>
            </tr>
          </thead>
          <tbody id="tx-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="nova-tx-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Novo Agendamento</span>
      <button class="modal-close" id="btn-fechar-modal">×</button>
    </div>
    <div class="field"><label>Especialidade ou Médico</label>
      <input type="text" id="ntx-nome" placeholder="Ex: Clínico Geral, Cardiologia, Dr. Carlos…">
    </div>
    <div class="field"><label>Data & Hora</label>
      <input type="datetime-local" id="ntx-valor" placeholder="Selecione data e hora">
    </div>
    <div class="field"><label>Tipo de Atendimento</label>
      <select id="ntx-tipo">
        <option value="sus">🩺 Sistema Único de Saúde (SUS)</option>
        <option value="particular">🏥 Particular / Convênio</option>
      </select>
    </div>
    <div class="field"><label>Unidade de Saúde</label>
      <select id="ntx-cat">
        <option>UBS Central - Centro</option>
        <option>UBS Zona Sul - Nova Brasília</option>
        <option>Hospital Universitário</option>
        <option>Clínica Integrada Conecta</option>
        <option>Ambulatório Médico do SUS</option>
      </select>
    </div>
    <button class="btn" id="btn-salvar-transacao">Agendar Consulta</button>
    <button class="btn btn-ghost" id="btn-cancelar-modal">Cancelar</button>
  </div>
</div>
<div id="toast-wrap" class="toast-wrap"></div>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/shared.js') }}"></script>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/consultas.js') }}"></script>
</body>
</html>
