<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>ConectaSaúde — Verificação Facial</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div id="auth-root" class="auth-body">
  <div class="card" style="width: 460px;">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Conecta<span>Saúde</span></div>
    </div>
    <div class="screen active">
      <h2>Verificação Biométrica</h2>
      <p class="subtitle">Etapa 3 de 3: Autenticação por Reconhecimento Facial</p>
      
      <div id="facial-msg" class="msg"></div>
      
      <div class="facial-container">
        <div class="webcam-outer-frame" id="webcam-frame">
          <video class="webcam-video" id="webcam-video" autoplay playsinline></video>
          <div class="scan-line" id="scan-line" style="display:none"></div>
          <div class="webcam-placeholder" id="webcam-placeholder">
            <i class="bi bi-camera-fill"></i>
            <span>Aguardando permissão de câmera...</span>
          </div>
        </div>
        
        <div class="scan-status-text" id="scan-status">Câmera desativada</div>
      </div>
      
      <button class="btn" id="btn-iniciar-scan" disabled>Iniciar Escaneamento 📷</button>
      <a href="{{ url_for('pagina_login') }}" class="btn btn-ghost" style="display:block;text-align:center;margin-top:0.5rem;text-decoration:none;padding:12px;border-radius:10px;">Cancelar e Sair</a>
    </div>
  </div>
</div>
<div id="toast-wrap" class="toast-wrap"></div>
<script nonce="{{ nonce }}" src="{{ url_for('static', filename='js/facial.js') }}"></script>
</body>
</html>
